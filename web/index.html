<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>awsobs — live infrastructure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/uplot@1.6.30/dist/uPlot.min.css">
<script src="https://unpkg.com/uplot@1.6.30/dist/uPlot.iife.min.js"></script>
<style>
  :root {
    --bg: #0f141b; --panel: #151c26; --panel-2: #1a2330;
    --line: #232d3b; --text: #c9d4e3; --muted: #6b7a8f;
    --accent: #3fbfb4; --warn: #e8a33d; --ok: #6fbf73; --bad: #e25d4e;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
    --sans: "IBM Plex Sans", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.5 var(--sans); overflow: hidden; }
  input, button { font-family: inherit; }

  header {
    display: flex; align-items: center; gap: 16px; height: 46px;
    padding: 0 16px; border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: .04em; }
  header h1 span { color: var(--muted); font-weight: 400; }
  .live { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bad); }
  .dot.on { background: var(--ok); }
  @media (prefers-reduced-motion: no-preference) { .dot.on { animation: pulse 2s infinite; } }
  @keyframes pulse { 50% { opacity: .35; } }

  .layout { display: grid; grid-template-columns: 64px 250px 1fr; height: calc(100vh - 47px); }

  /* column 1: service rail */
  #rail { border-right: 1px solid var(--line); padding: 10px 0; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .tile {
    width: 46px; height: 40px; border-radius: 8px; border: 1px solid transparent;
    background: none; color: var(--muted); cursor: pointer;
    font: 500 10px/1.1 var(--mono); letter-spacing: .03em;
    display: flex; align-items: center; justify-content: center; text-align: center; padding: 2px;
  }
  .tile:hover { background: var(--panel); color: var(--text); }
  .tile.active { background: var(--panel-2); color: var(--accent); border-color: var(--line); }
  .tile.nodata { opacity: .4; }
  .rail-sect { font-size: 9px; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; margin: 8px 0 2px; }

  /* column 2: resource list */
  #reslist { border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
  #reslist .hd { padding: 10px 12px 8px; border-bottom: 1px solid var(--line); }
  #reslist .hd .svc { font-weight: 600; font-size: 13px; }
  #reslist .hd .cnt { color: var(--muted); font-family: var(--mono); font-size: 11px; margin-left: 6px; }
  #ressearch {
    width: 100%; margin-top: 8px; background: var(--panel); border: 1px solid var(--line);
    color: var(--text); border-radius: 6px; padding: 5px 9px; font: 12px var(--mono);
  }
  #ressearch:focus, #metricfilter:focus { outline: 1px solid var(--accent); }
  #resitems { overflow-y: auto; flex: 1; padding: 6px; }
  .res {
    display: flex; align-items: center; gap: 8px; width: 100%;
    background: none; border: 0; color: var(--text); text-align: left; cursor: pointer;
    padding: 7px 10px; border-radius: 6px; font-size: 12.5px;
  }
  .res:hover { background: var(--panel); }
  .res.active { background: var(--panel-2); }
  .res .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .res .meta { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .pdot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .caret { color: var(--muted); font-size: 10px; width: 12px; flex: none; }
  .pdot.Running { background: var(--ok); } .pdot.Pending { background: var(--warn); }
  .pdot.Failed, .pdot.Unknown { background: var(--bad); } .pdot.Succeeded { background: var(--muted); }

  /* column 3: main */
  #main { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  #mainbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 16px; border-bottom: 1px solid var(--line);
  }
  #mainbar .rname { font-weight: 600; font-size: 13.5px; max-width: 34ch; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #mainbar .phase { font: 11px var(--mono); }
  #mainbar .phase.Running { color: var(--ok); } #mainbar .phase.Pending { color: var(--warn); }
  #mainbar .phase.Failed { color: var(--bad); }
  #logsbtn {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--muted);
    border-radius: 5px; font-size: 11px; padding: 3px 10px; cursor: pointer; display: none;
  }
  #logsbtn:hover { color: var(--text); border-color: var(--muted); }
  #metricfilter {
    margin-left: auto; background: var(--panel); border: 1px solid var(--line);
    color: var(--text); border-radius: 6px; padding: 5px 10px; width: 200px; font: 12px var(--mono);
  }
  #ctxfilters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  #ctxfilters select {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: 5px 8px; font: 12px var(--mono); max-width: 220px;
  }
  #ctxfilters select:focus { outline: 1px solid var(--accent); }
  #ctxfilters .lbl { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  #mainlogwrap { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  #mainlog { flex: 1; overflow-y: auto; margin: 0; background: #0b0f15; border: 1px solid var(--line);
    border-radius: 8px; padding: 12px 16px; font: 12px/1.6 var(--mono); color: #a8b6c8;
    white-space: pre-wrap; word-break: break-all; }
  #mainlog .ts { color: var(--muted); }
  .pills { display: flex; gap: 2px; background: var(--panel); border: 1px solid var(--line); border-radius: 7px; padding: 2px; }
  .pill { background: none; border: 0; color: var(--muted); font: 11px var(--mono); padding: 4px 9px; border-radius: 5px; cursor: pointer; }
  .pill:hover { color: var(--text); }
  .pill.active { background: var(--panel-2); color: var(--accent); }
  .pill.hidden { display: none; }

  #charts { overflow-y: auto; flex: 1; padding: 14px 16px 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(430px, 1fr)); gap: 12px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px 6px; }
  .card .hd { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px; }
  .card .title { font-weight: 500; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .val { margin-left: auto; font-family: var(--mono); font-size: 12px; color: var(--accent); white-space: nowrap; }
  .card .legend { display: flex; flex-wrap: wrap; gap: 4px 12px; padding: 4px 0 2px; font: 10.5px var(--mono); color: var(--muted); }
  .card .legend .sw { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 5px; }
  .card .nodata { color: var(--muted); font: 12px var(--mono); padding: 40px 0; text-align: center; }
  .empty { color: var(--muted); padding: 70px 20px; text-align: center; font: 13px var(--mono); white-space: pre-line; }
  .u-legend { display: none; }

  #drawer {
    position: fixed; left: 0; right: 0; bottom: 0; height: 42vh;
    background: #0b0f15; border-top: 1px solid var(--line); display: none;
    flex-direction: column; z-index: 10;
  }
  #drawer.open { display: flex; }
  #drawer .bar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-bottom: 1px solid var(--line); }
  #drawer .bar .name { font: 12px var(--mono); color: var(--accent); }
  #drawer .bar select { background: var(--panel); color: var(--text); border: 1px solid var(--line); border-radius: 5px; font: 11px var(--mono); padding: 2px 6px; }
  #drawer .bar button { margin-left: auto; background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 5px; padding: 3px 10px; cursor: pointer; font-size: 12px; }
  #loglines { flex: 1; overflow-y: auto; margin: 0; padding: 10px 16px; font: 12px/1.6 var(--mono); color: #a8b6c8; white-space: pre-wrap; word-break: break-all; }
  #loglines .ts { color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>awsobs <span>/ live infrastructure</span></h1>
  <div class="live"><div class="dot" id="dot"></div><span id="rate">connecting…</span></div>
</header>

<div class="layout">
  <nav id="rail"></nav>
  <div id="reslist">
    <div class="hd">
      <span class="svc" id="svcname">—</span><span class="cnt" id="svccnt"></span>
      <input id="ressearch" placeholder="search…">
    </div>
    <div id="resitems"></div>
  </div>
  <div id="main">
    <div id="mainbar">
      <span class="rname" id="rname">select a resource</span>
      <span class="phase" id="rphase"></span>
      <button id="logsbtn">logs</button>
      <input id="metricfilter" placeholder="filter metrics…">
      <div class="pills" id="pills"></div>
    </div>
    <div id="charts"><div class="empty">pick a service on the left rail</div></div>
  </div>
</div>

<div id="drawer">
  <div class="bar">
    <span class="name" id="logname"></span>
    <select id="logcontainer"></select>
    <label style="font-size:12px;color:var(--muted)"><input type="checkbox" id="follow" checked> follow</label>
    <button id="closelog">Close</button>
  </div>
  <pre id="loglines"></pre>
</div>

<script>
"use strict";
// ---------------- state ----------------
const S = {
  series: new Map(), data: new Map(), ringLoaded: new Set(), histRange: new Map(),
  charts: [], dirty: new Set(), pods: [],
  service: null,
  resource: null,   // flat services
  sel: null,        // EKS: {t:"cp"|"nodes"|"kind", cluster, kind, ns, wl, pod, node, view}
  exp: new Set(),
  range: 3600, mfilter: "", rsearch: "", events: 0,
  status: null,
};
function svcConfigured(svc) {
  if (!S.status) return null; // unknown yet
  if (svc === "EKS") return (S.status.clusters || []).length > 0 ||
    ((S.status.aws && S.status.aws.namespaces) || []).includes("AWS/EKS");
  if (svc === "Hosts") return null; // agents are push-based; can't know from config
  if ((S.status.native || []).includes(svc)) return true;
  const nsList = (S.status.aws && S.status.aws.namespaces) || [];
  for (const ns of nsList) {
    const short = ns.replace("AWS/", "");
    if ((NS2SVC[short] || short) === svc) return true;
  }
  return false;
}
const RING_SPAN = 6 * 3600;
const MEMBER_CAP = 12;
const PALETTE = ["#3fbfb4","#e8a33d","#9a7fdd","#d4537e","#5b9bd5","#97c459","#f09595","#b4b2a9","#6fbf73","#e25d4e","#c9d4e3","#8a6d3b"];
const RANGES = [[1800,"30m"],[3600,"1h"],[10800,"3h"],[21600,"6h"],[86400,"24h"],[259200,"3d"],[604800,"7d"]];
const BOOT_T = Date.now();
const loadingOr = msg => (Date.now() - BOOT_T < 120000 ? "loading… collectors are warming up" : msg);
const KIND_ORDER = ["Deployment","StatefulSet","DaemonSet","Job","CronJob","ReplicaSet","Rollout","Pod"];
const KIND_PLURAL = {Deployment:"Deployments", StatefulSet:"StatefulSets", DaemonSet:"DaemonSets",
  Job:"Jobs", CronJob:"CronJobs", ReplicaSet:"ReplicaSets", Rollout:"Rollouts", Pod:"Pods"};

// ---------------- services ----------------
const SVCMETA = {
  "EKS":         {abbr:"EKS",  title:"EKS clusters", live:true, ord:0},
  "Hosts":       {abbr:"HOST", title:"Host agents (EC2 / VMs)", live:true, ord:1},
  "EC2":         {abbr:"EC2",  title:"EC2 instances", ord:3},
  "ALB":         {abbr:"ALB",  title:"Application load balancers", ord:4},
  "NLB":         {abbr:"NLB",  title:"Network load balancers", ord:5},
  "RDS":         {abbr:"RDS",  title:"RDS databases", ord:6},
  "DocDB":       {abbr:"DOC",  title:"DocumentDB", ord:7},
  "Valkey":      {abbr:"VLK",  title:"Valkey / ElastiCache", ord:8},
  "MQ":          {abbr:"MQ",   title:"AmazonMQ brokers", ord:9},
  "OpenSearch":  {abbr:"OS",   title:"OpenSearch domains", ord:10},
  "S3":          {abbr:"S3",   title:"S3 buckets", ord:11},
  "Insights":    {abbr:"CI",   title:"Container Insights", ord:12},
};
const NS2SVC = {EC2:"EC2", RDS:"RDS", DocDB:"DocDB", ElastiCache:"Valkey", AmazonMQ:"MQ",
  ES:"OpenSearch", S3:"S3", ApplicationELB:"ALB", NetworkELB:"NLB", EKS:"EKS", ContainerInsights:"Insights"};

function svcOf(meta) {
  const L = meta.labels || {};
  if (L.source === "k8s") return "EKS";
  if (L.source === "agent") return "Hosts";
  if (L.source === "native") return L.svc || "Native";
  const ns = (L.namespace || "").replace("AWS/", "");
  return NS2SVC[ns] || ns || "Other";
}
const isLive = svc => !!(SVCMETA[svc] && SVCMETA[svc].live);

// ---------------- formatting ----------------
const fmtBytes = v => {
  if (v == null || isNaN(v)) return "–";
  const u = ["B","KiB","MiB","GiB","TiB"]; let i = 0;
  while (Math.abs(v) >= 1024 && i < u.length-1) { v /= 1024; i++; }
  return v.toFixed(Math.abs(v) >= 100 ? 0 : 1) + " " + u[i];
};
const fmtCores = v => v == null || isNaN(v) ? "–" : (v < 1 ? Math.round(v*1000) + "m" : v.toFixed(2));
const fmtSecs = v => v == null || isNaN(v) ? "–" : (v < 0.001 ? (v*1e6).toFixed(0)+"µs" : v < 1 ? (v*1000).toFixed(1)+"ms" : v.toFixed(2)+"s");
const fmtPct = v => v == null || isNaN(v) ? "–" : v.toFixed(1)+"%";
const fmtNum = v => {
  if (v == null || isNaN(v)) return "–";
  if (Math.abs(v) >= 1e9) return (v/1e9).toFixed(1)+"G";
  if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(1)+"M";
  if (Math.abs(v) >= 1e3) return (v/1e3).toFixed(1)+"k";
  return Math.abs(v) < 10 && v !== Math.round(v) ? v.toFixed(2) : String(Math.round(v));
};
function metricFmt(name) {
  if (name === "cpu_cores") return fmtCores;
  if (/memory_bytes|Memory|Bytes|Storage|MemUsed|MemLimit|DiskFree/i.test(name)) return fmtBytes;
  if (/Latency|ResponseTime|duration_seconds/i.test(name)) return fmtSecs;
  if (/Utilization|Percentage|Pressure|Ratio|_pct$/i.test(name)) return fmtPct;
  return fmtNum;
}

// ---------------- data plumbing ----------------
async function ensureRing(id) {
  if (S.ringLoaded.has(id)) return;
  S.ringLoaded.add(id);
  const pts = await fetch("/api/series/data?id=" + encodeURIComponent(id)).then(r => r.json()).catch(() => []);
  const m = S.data.get(id) || new Map();
  for (const p of pts) m.set(p.t, p.v);
  S.data.set(id, m);
}
async function ensureHistory(id, range) {
  if (range <= RING_SPAN) return;
  const meta = S.series.get(id);
  if (!meta || (meta.labels||{}).source !== "cloudwatch") return;
  if ((S.histRange.get(id) || 0) >= range) return;
  S.histRange.set(id, range);
  const now = Math.floor(Date.now()/1000);
  const pts = await fetch(`/api/history?id=${encodeURIComponent(id)}&from=${now-range}&to=${now}`)
    .then(r => r.ok ? r.json() : []).catch(() => []);
  const m = S.data.get(id) || new Map();
  for (const p of pts) m.set(p.t, p.v);
  S.data.set(id, m);
}
function lastVal(id) {
  const m = S.data.get(id);
  if (m && m.size) { let mt = -1, mv = null; for (const [t,v] of m) if (t > mt) { mt = t; mv = v; } return mv; }
  const meta = S.series.get(id);
  return meta && meta.last ? meta.last.v : null;
}
function windowed(ids) {
  const now = Math.floor(Date.now()/1000), from = now - S.range;
  const xset = new Set();
  for (const id of ids) {
    const m = S.data.get(id);
    if (m) for (const t of m.keys()) if (t >= from) xset.add(t);
  }
  const xs = [...xset].sort((a,b) => a-b);
  const cols = ids.map(id => {
    const m = S.data.get(id) || new Map();
    return xs.map(t => m.has(t) ? m.get(t) : null);
  });
  return [xs, ...cols];
}

// ---------------- rail ----------------
function buildRail() {
  const seen = new Map();
  for (const meta of S.series.values()) {
    const s = svcOf(meta);
    seen.set(s, (seen.get(s)||0) + 1);
  }
  const svcs = [...new Set([...Object.keys(SVCMETA), ...seen.keys()])].sort((a,b) => {
    const oa = SVCMETA[a] ? SVCMETA[a].ord : 99, ob = SVCMETA[b] ? SVCMETA[b].ord : 99;
    return oa - ob || a.localeCompare(b);
  });
  const rail = document.getElementById("rail");
  rail.innerHTML = "";
  let sect = null;
  for (const s of svcs) {
    const want = isLive(s) ? "live" : "aws";
    if (sect !== want) {
      sect = want;
      const d = document.createElement("div");
      d.className = "rail-sect"; d.textContent = sect;
      rail.appendChild(d);
    }
    const n = seen.get(s) || 0;
    const conf = svcConfigured(s);
    if (!n && conf === false) continue; // not collected: don't show a dead tile
    const b = document.createElement("button");
    b.className = "tile" + (s === S.service ? " active" : "") + (n ? "" : " nodata");
    let state = n ? n + " series" : "loading…";
    if (!n && conf === null && s === "Hosts") state = "no agents reporting yet";
    if (!n && Date.now() - BOOT_T > 120000) state = "configured, but no data yet";
    b.title = (SVCMETA[s] ? SVCMETA[s].title : s) + " · " + state;
    b.textContent = SVCMETA[s] ? SVCMETA[s].abbr : s.slice(0, 4).toUpperCase();
    b.onclick = () => selectService(s);
    rail.appendChild(b);
  }
  if (!S.service) {
    const withData = svcs.find(s => seen.get(s));
    if (withData) selectService(withData);
  }
}

function selectService(svc) {
  S.service = svc; S.resource = null; S.sel = null; S.rsearch = "";
  document.getElementById("ressearch").value = "";
  buildRail(); buildResList();
  if (svc === "EKS") {
    const cs = eksClusters();
    if (cs.length) { S.exp.add("c:" + cs[0]); select({t:"cp", cluster: cs[0], view:"metrics"}); }
    else renderMain();
  } else {
    const items = resourcesOf(svc);
    if (items.length) selectResource(items[0][0]); else renderMain();
  }
}

// ---------------- flat resource list (non-EKS) ----------------
function resourcesOf(svc) {
  const map = new Map();
  for (const meta of S.series.values()) {
    if (svcOf(meta) !== svc) continue;
    const r = (meta.labels||{}).resource || "_aggregate";
    map.set(r, (map.get(r)||0) + 1);
  }
  return [...map.entries()].sort((a,b) => a[0].localeCompare(b[0]));
}
function buildResList() {
  document.getElementById("svcname").textContent = SVCMETA[S.service] ? SVCMETA[S.service].title : (S.service||"—");
  if (S.service === "EKS") { buildEKSNav(); return; }
  const items = resourcesOf(S.service).filter(([r]) => !S.rsearch || r.toLowerCase().includes(S.rsearch));
  document.getElementById("svccnt").textContent = items.length;
  const box = document.getElementById("resitems");
  box.innerHTML = "";
  for (const [r, n] of items) {
    const b = document.createElement("button");
    b.className = "res" + (r === S.resource ? " active" : "");
    b.innerHTML = `<span class="nm">${r === "_aggregate" ? "(aggregate)" : r}</span><span class="meta">${n}</span>`;
    b.onclick = () => selectResource(r);
    box.appendChild(b);
  }
}
function selectResource(r) { S.resource = r; S.sel = null; buildResList(); renderMain(); }

// ---------------- EKS nav (shallow) ----------------
function eksClusters() {
  const set = new Set();
  for (const p of S.pods) if (p.cluster) set.add(p.cluster);
  for (const m of S.series.values()) {
    const L = m.labels || {};
    if (L.source === "k8s" && L.cluster) set.add(L.cluster);
    if (L.source === "cloudwatch" && L.namespace === "AWS/EKS" && L.resource) set.add(L.resource);
  }
  return [...set].sort();
}
function clusterNodes(cluster) {
  const set = new Set();
  for (const m of S.series.values()) {
    const L = m.labels || {};
    if (L.source === "k8s" && L.kind === "node" && L.cluster === cluster) set.add(L.node);
  }
  return [...set].sort();
}
function podsOf(cluster, kind, ns, wl) {
  return S.pods.filter(p => p.cluster === cluster
    && (!kind || (p.workloadKind || "Pod") === kind)
    && (!ns || p.namespace === ns)
    && (!wl || (p.workload || p.name) === wl));
}
function kindCounts(cluster) { // kind -> distinct workload count
  const m = new Map();
  for (const p of S.pods) {
    if (p.cluster !== cluster) continue;
    const k = p.workloadKind || "Pod";
    if (!m.has(k)) m.set(k, new Set());
    m.get(k).add(p.namespace + "/" + (p.workload || p.name));
  }
  return m;
}
const selKey = s => s ? [s.t, s.cluster, s.kind, s.ns, s.wl, s.pod, s.node].join("~") : "";
function select(sel) { S.sel = sel; S.resource = null; closeLogStream(); buildEKSNav(); renderMain(); }
function toggle(key) { S.exp.has(key) ? S.exp.delete(key) : S.exp.add(key); buildEKSNav(); }

function treeRow(box, depth, opts) {
  const b = document.createElement("button");
  b.className = "res" + (opts.active ? " active" : "");
  b.style.paddingLeft = (10 + depth * 14) + "px";
  const caret = `<span class="caret">${opts.caret === undefined ? "" : (opts.caret ? "▾" : "▸")}</span>`;
  b.innerHTML = `${caret}${opts.dot || ""}<span class="nm">${opts.label}</span>` +
    (opts.tag !== undefined ? `<span class="meta">${opts.tag}</span>` : "");
  b.onclick = opts.onclick;
  box.appendChild(b);
}

function buildEKSNav() {
  const box = document.getElementById("resitems");
  box.innerHTML = "";
  const clusters = eksClusters();
  document.getElementById("svccnt").textContent = clusters.length + " clusters";
  const k = selKey(S.sel);

  if (S.rsearch) { // flat pod search across clusters
    let shown = 0;
    for (const p of S.pods) {
      const hay = (p.cluster + "/" + p.namespace + "/" + p.name + "/" + (p.workload||"")).toLowerCase();
      if (!hay.includes(S.rsearch)) continue;
      if (++shown > 200) break;
      treeRow(box, 0, {
        label: p.namespace + "/" + p.name, tag: p.cluster,
        dot: `<span class="pdot ${p.phase}"></span>`,
        onclick: () => select({t:"kind", cluster:p.cluster, kind:p.workloadKind || "Pod",
                               ns:p.namespace, wl:p.workload || p.name, pod:p.name, view:"metrics"}),
      });
    }
    if (!shown) box.innerHTML = `<div class="empty" style="padding:30px 10px">no matches</div>`;
    return;
  }

  for (const c of clusters) {
    const open = S.exp.has("c:" + c);
    treeRow(box, 0, {
      label: c, caret: open,
      active: k === selKey({t:"cp", cluster:c}),
      onclick: () => {
        const wasOpen = S.exp.has("c:" + c);
        const wasSel = k === selKey({t:"cp", cluster:c});
        for (const e of [...S.exp]) if (e.startsWith("c:")) S.exp.delete(e);
        if (!(wasOpen && wasSel)) S.exp.add("c:" + c);
        select({t:"cp", cluster:c, view:"metrics"});
      },
    });
    if (!open) continue;
    treeRow(box, 1, {
      label: "Control plane",
      active: k === selKey({t:"cp", cluster:c}),
      onclick: () => select({t:"cp", cluster:c, view:"metrics"}),
    });
    const nodes = clusterNodes(c);
    treeRow(box, 1, {
      label: "Nodes", tag: nodes.length,
      active: S.sel && S.sel.t === "nodes" && S.sel.cluster === c,
      onclick: () => select({t:"nodes", cluster:c, node:"", view:"metrics"}),
    });
    const kinds = kindCounts(c);
    for (const kind of KIND_ORDER) {
      if (!kinds.has(kind)) continue;
      treeRow(box, 1, {
        label: KIND_PLURAL[kind] || kind, tag: kinds.get(kind).size,
        active: S.sel && S.sel.t === "kind" && S.sel.cluster === c && S.sel.kind === kind,
        onclick: () => {
          const pods = podsOf(c, kind);
          const nss = [...new Set(pods.map(p => p.namespace))].sort();
          const ns = nss[0] || "";
          const wls = [...new Set(podsOf(c, kind, ns).map(p => p.workload || p.name))].sort();
          select({t:"kind", cluster:c, kind, ns, wl: wls[0] || "", pod:"", view:"metrics"});
        },
      });
    }
  }
  if (!clusters.length) box.innerHTML = `<div class="empty" style="padding:30px 10px">${loadingOr("no clusters yet - check kubernetes.contexts config")}</div>`;
}

// ---------------- time pills ----------------
function buildPills() {
  const box = document.getElementById("pills");
  box.innerHTML = "";
  const sel = S.sel;
  const inLogs = sel && sel.view === "logs";
  box.style.display = inLogs ? "none" : "";
  document.getElementById("metricfilter").style.display = inLogs ? "none" : "";
  const longOK = S.service !== "Hosts" && !(S.service === "EKS" && sel && sel.t !== "cp");
  for (const [secs, label] of RANGES) {
    const b = document.createElement("button");
    b.className = "pill" + (secs === S.range ? " active" : "") + (!longOK && secs > RING_SPAN ? " hidden" : "");
    b.textContent = label;
    b.onclick = () => { S.range = secs; renderMain(); };
    box.appendChild(b);
  }
}

// ---------------- context filter bar ----------------
function mkSelect(opts, value, onchange) {
  const sel = document.createElement("select");
  for (const [v, label] of opts) {
    const o = document.createElement("option");
    o.value = v; o.textContent = label;
    if (v === value) o.selected = true;
    sel.appendChild(o);
  }
  sel.onchange = () => onchange(sel.value);
  return sel;
}
function mkToggle(view) {
  const box = document.createElement("div");
  box.className = "pills";
  for (const v of ["metrics", "logs"]) {
    const b = document.createElement("button");
    b.className = "pill" + (view === v ? " active" : "");
    b.textContent = v;
    b.onclick = () => {
      const sel = {...S.sel, view: v};
      if (v === "logs" && !sel.pod) { // logs need one pod
        const pods = podsOf(sel.cluster, sel.kind, sel.ns, sel.wl);
        sel.pod = pods.length ? pods[0].name : "";
      }
      select(sel);
    };
    box.appendChild(b);
  }
  return box;
}
function buildCtxFilters() {
  let bar = document.getElementById("ctxfilters");
  if (!bar) {
    bar = document.createElement("div");
    bar.id = "ctxfilters";
    const rn = document.getElementById("rname");
    rn.parentNode.insertBefore(bar, rn.nextSibling);
  }
  bar.innerHTML = "";
  const sel = S.sel;
  if (!sel || S.service !== "EKS") return;

  if (sel.t === "nodes") {
    const nodes = clusterNodes(sel.cluster);
    bar.append(mkSelect([["", "All nodes"], ...nodes.map(n => [n, n])], sel.node,
      v => select({...sel, node: v})));
    return;
  }
  if (sel.t === "kind") {
    const nss = [...new Set(podsOf(sel.cluster, sel.kind).map(p => p.namespace))].sort();
    bar.append(mkSelect(nss.map(n => [n, n]), sel.ns, v => {
      const wls = [...new Set(podsOf(sel.cluster, sel.kind, v).map(p => p.workload || p.name))].sort();
      select({...sel, ns: v, wl: wls[0] || "", pod: "", view: "metrics"});
    }));
    const wls = [...new Set(podsOf(sel.cluster, sel.kind, sel.ns).map(p => p.workload || p.name))].sort();
    bar.append(mkSelect(wls.map(w => [w, w]), sel.wl, v => select({...sel, wl: v, pod: "", view: "metrics"})));
    const pods = podsOf(sel.cluster, sel.kind, sel.ns, sel.wl).sort((a,b) => a.name.localeCompare(b.name));
    bar.append(mkSelect([["", "All pods"], ...pods.map(p => [p.name, p.name])], sel.pod,
      v => select({...sel, pod: v, view: v ? sel.view : "metrics"})));
    bar.append(mkToggle(sel.view));
  }
}

// ---------------- main area ----------------
const axisStyle = { stroke: "#6b7a8f", grid: {stroke: "#1c2531", width: 1}, ticks: {stroke: "#1c2531"} };

function groupsByMetric(metas) {
  const byMetric = new Map();
  for (const m of metas) {
    const L = m.labels || {};
    if (S.mfilter && !(L.metric||"").toLowerCase().includes(S.mfilter)) continue;
    if (!byMetric.has(L.metric)) byMetric.set(L.metric, []);
    byMetric.get(L.metric).push(m);
  }
  return [...byMetric.keys()].sort().map(metric => {
    const ms = byMetric.get(metric).sort((a,b) => (a.labels.variant||"").localeCompare(b.labels.variant||"")).slice(0, MEMBER_CAP);
    return {metric, members: ms.map((m, i) => ({id: m.id, variant: m.labels.variant || m.labels.stat || "", color: PALETTE[i % PALETTE.length]}))};
  });
}
// overlay group: one chart per metric, one line per entity, top-N by usage
function overlayGroups(metas, nameOf, total) {
  const byMetric = new Map();
  for (const m of metas) {
    const metric = m.labels.metric;
    if (S.mfilter && !metric.toLowerCase().includes(S.mfilter)) continue;
    if (!byMetric.has(metric)) byMetric.set(metric, []);
    byMetric.get(metric).push(m);
  }
  return [...byMetric.keys()].sort().map(metric => {
    let ms = byMetric.get(metric);
    ms.sort((a,b) => (lastVal(b.id) ?? -1) - (lastVal(a.id) ?? -1));
    const over = Math.max(0, ms.length - MEMBER_CAP);
    ms = ms.slice(0, MEMBER_CAP);
    return {metric, over, members: ms.map((m, i) => ({id: m.id, variant: nameOf(m), color: PALETTE[i % PALETTE.length]}))};
  });
}

function renderMain() {
  buildPills(); buildCtxFilters();
  for (const c of S.charts) c.u && c.u.destroy();
  S.charts = []; S.dirty.clear();
  const box = document.getElementById("charts");
  box.innerHTML = "";

  let title = "select a resource", groups = [], phase = "", hint = "";
  const metas = [...S.series.values()];
  const sel = S.sel;

  if (S.service === "EKS" && sel) {
    if (sel.t === "cp") {
      title = sel.cluster + " · control plane";
      groups = groupsByMetric(metas.filter(m => {
        const L = m.labels||{};
        return L.source === "cloudwatch" && L.namespace === "AWS/EKS" && L.resource === sel.cluster;
      }));
      const cwEKS = [...new Set(metas.filter(m => (m.labels||{}).source === "cloudwatch" && m.labels.namespace === "AWS/EKS").map(m => m.labels.resource))].sort();
      hint = 'no AWS/EKS CloudWatch metrics for "' + sel.cluster + '"' + String.fromCharCode(10) +
        (cwEKS.length ? "CloudWatch reports clusters: " + cwEKS.join(", ")
                      : "no AWS/EKS series at all - check the AWS collector region/profile in the server log");
    } else if (sel.t === "nodes") {
      const nm = metas.filter(m => {
        const L = m.labels||{};
        return L.source === "k8s" && L.kind === "node" && L.cluster === sel.cluster
          && (!sel.node || L.node === sel.node);
      });
      title = sel.cluster;
      groups = sel.node ? groupsByMetric(nm) : overlayGroups(nm, m => m.labels.node);
    } else if (sel.t === "kind") {
      const pm = metas.filter(m => {
        const L = m.labels||{};
        return L.source === "k8s" && L.kind === "pod" && L.cluster === sel.cluster
          && L.namespace === sel.ns && (L.workload || L.pod) === sel.wl
          && (!sel.pod || L.pod === sel.pod);
      });
      title = sel.cluster;
      if (sel.pod) {
        const info = S.pods.find(p => p.cluster === sel.cluster && p.namespace === sel.ns && p.name === sel.pod);
        phase = info ? info.phase : "";
        if (sel.view === "logs") {
          document.getElementById("rname").textContent = title;
          setPhase(phase);
          renderLogsInline(box, info || {cluster: sel.cluster, namespace: sel.ns, name: sel.pod, containers: []});
          return;
        }
        groups = groupsByMetric(pm);
      } else {
        groups = overlayGroups(pm, m => m.labels.pod);
      }
      hint = "no pod metrics yet — is metrics-server running in this cluster?";
    }
  } else if (S.resource) {
    title = S.resource === "_aggregate" ? "(aggregate)" : S.resource;
    groups = groupsByMetric(metas.filter(m =>
      svcOf(m) === S.service && ((m.labels||{}).resource || "_aggregate") === S.resource));
    if (S.service === "Hosts" && S.charts) { /* logs via button below */ }
  }

  document.getElementById("rname").textContent = title;
  setPhase(phase);
  const lb = document.getElementById("logsbtn");
  const hostLogs = S.service === "Hosts" && S.resource;
  lb.style.display = hostLogs ? "" : "none";
  lb.onclick = hostLogs ? () => openAgentLogs(S.resource) : null;

  if (!groups.length) {
    box.innerHTML = `<div class="empty">${hint || loadingOr("no metrics here yet")}</div>`;
    return;
  }
  const grid = document.createElement("div");
  grid.className = "grid";
  box.appendChild(grid);

  const gen = renderMain.gen = (renderMain.gen||0) + 1;
  for (const g of groups) {
    const fmt = metricFmt(g.metric);
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<div class="hd"><span class="title">${g.metric}</span><span class="val">–</span></div><div class="plot"></div>`;
    if (g.members.length > 1) {
      const lg = document.createElement("div");
      lg.className = "legend";
      lg.innerHTML = g.members.map(m => `<span><span class="sw" style="background:${m.color}"></span>${m.variant || "value"}</span>`).join("")
        + (g.over ? `<span>+${g.over} more (top ${MEMBER_CAP} by current value)</span>` : "");
      card.appendChild(lg);
    }
    grid.appendChild(card);
    const chart = {u: null, metric: g.metric, members: g.members, fmt, card, valEl: card.querySelector(".val")};
    S.charts.push(chart);
    Promise.all(g.members.map(m => ensureRing(m.id).then(() => ensureHistory(m.id, S.range)))).then(() => {
      if (renderMain.gen !== gen) return;
      drawChart(chart);
    });
  }
}
function setPhase(phase) {
  const ph = document.getElementById("rphase");
  ph.textContent = phase; ph.className = "phase " + phase;
}

function drawChart(chart) {
  const el = chart.card.querySelector(".plot");
  const data = windowed(chart.members.map(m => m.id));
  if (chart.u) { chart.u.setData(data); updateVal(chart, data); return; }
  if (!data[0].length) { el.innerHTML = `<div class="nodata">no data in range</div>`; chart.pending = true; updateVal(chart, data); return; }
  el.innerHTML = "";
  chart.pending = false;
  const opts = {
    width: el.clientWidth || 400, height: 150,
    cursor: {points: {show: false}},
    padding: [8, 8, 0, 0],
    scales: { x: { range: () => { const n = Date.now()/1000; return [n - S.range, n]; } } },
    series: [ {}, ...chart.members.map(m => ({label: m.variant, stroke: m.color, width: 1.5, spanGaps: true,
                fill: chart.members.length === 1 ? m.color + "14" : undefined})) ],
    axes: [
      {...axisStyle, values: (u, vals) => vals.map(t => {
        const d = new Date(t*1000);
        return S.range > 86400 ? (d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+"h"
                               : d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
      })},
      {...axisStyle, size: 64, values: (u, vals) => vals.map(chart.fmt)},
    ],
  };
  chart.u = new uPlot(opts, data, el);
  new ResizeObserver(() => chart.u && chart.u.setSize({width: el.clientWidth, height: 150})).observe(el);
  updateVal(chart, data);
}
function updateVal(chart, data) {
  let last = null;
  const col = data[1] || [];
  for (let i = col.length - 1; i >= 0; i--) if (col[i] != null) { last = col[i]; break; }
  chart.valEl.textContent = chart.fmt(last);
}
setInterval(() => {
  for (const idx of S.dirty) {
    const c = S.charts[idx];
    if (c && (c.u || c.pending)) drawChart(c);
  }
  S.dirty.clear();
}, 1000);

// ---------------- live stream ----------------
function connectStream() {
  const es = new EventSource("/api/stream");
  const dot = document.getElementById("dot");
  es.onopen = () => dot.classList.add("on");
  es.onerror = () => dot.classList.remove("on");
  es.addEventListener("point", ev => {
    S.events++;
    const u = JSON.parse(ev.data);
    let isNew = false;
    if (!S.series.has(u.id)) { S.series.set(u.id, {id: u.id, labels: u.labels}); isNew = true; }
    const m = S.data.get(u.id) || new Map();
    m.set(u.point.t, u.point.v);
    S.data.set(u.id, m);
    if (isNew) { buildRail(); if (svcOf({labels: u.labels || {}}) === S.service) buildResList(); return; }
    S.charts.forEach((c, i) => { if (c.members.some(mb => mb.id === u.id)) S.dirty.add(i); });
  });
}
setInterval(() => {
  document.getElementById("rate").textContent = S.events + " pts/10s · " + S.series.size + " series";
  S.events = 0;
}, 10000);

// ---------------- logs (inline + drawer) ----------------
let logES = null;
function closeLogStream() { if (logES) { logES.close(); logES = null; } }
function pushLine(target, txt) {
  const atBottom = target.scrollTop + target.clientHeight >= target.scrollHeight - 40;
  const sp = txt.indexOf(" ");
  const div = document.createElement("div");
  if (sp > 0) div.innerHTML = `<span class="ts">${txt.slice(0, sp)}</span> ${escapeHTML(txt.slice(sp+1))}`;
  else div.textContent = txt;
  target.appendChild(div);
  while (target.children.length > 2000) target.removeChild(target.firstChild);
  const follow = document.getElementById("follow");
  if ((follow && target.id === "loglines") ? follow.checked : atBottom) target.scrollTop = target.scrollHeight;
}
function startLogURL(url, target) {
  closeLogStream();
  target.textContent = "";
  logES = new EventSource(url);
  logES.addEventListener("log", ev => pushLine(target, JSON.parse(ev.data)));
  logES.addEventListener("error", ev => { if (ev.data) pushLine(target, "!! " + JSON.parse(ev.data)); });
  logES.addEventListener("eof", () => pushLine(target, "-- log stream ended --"));
}
function logsURLFor(pod, container) {
  return `/api/logs?cluster=${encodeURIComponent(pod.cluster||"")}&namespace=${encodeURIComponent(pod.namespace)}&pod=${encodeURIComponent(pod.name)}&container=${encodeURIComponent(container||"")}&tail=200`;
}
// inline (main area) log view for EKS pod selections
function renderLogsInline(box, pod) {
  const wrap = document.createElement("div");
  wrap.id = "mainlogwrap";
  const bar = document.createElement("div");
  bar.style.cssText = "display:flex;align-items:center;gap:10px;margin-bottom:10px;";
  if ((pod.containers || []).length > 1) {
    const lbl = document.createElement("span");
    lbl.className = "lbl"; lbl.textContent = "container";
    lbl.style.cssText = "font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)";
    const csel = mkSelect(pod.containers.map(c => [c, c]), pod.containers[0],
      v => startLogURL(logsURLFor(pod, v), document.getElementById("mainlog")));
    bar.append(lbl, csel);
  }
  const pre = document.createElement("pre");
  pre.id = "mainlog";
  wrap.append(bar, pre);
  box.appendChild(wrap);
  startLogURL(logsURLFor(pod, (pod.containers || [])[0] || ""), pre);
}
// drawer (Hosts)
function openAgentLogs(host) {
  document.getElementById("logname").textContent = host;
  document.getElementById("logcontainer").style.display = "none";
  document.getElementById("drawer").classList.add("open");
  startLogURL(`/api/agentlogs?source=${encodeURIComponent("host/" + host)}&tail=200`, document.getElementById("loglines"));
}
function escapeHTML(s) { return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
document.getElementById("closelog").onclick = () => {
  document.getElementById("drawer").classList.remove("open");
  closeLogStream();
};

// ---------------- inputs ----------------
document.getElementById("ressearch").addEventListener("input", e => { S.rsearch = e.target.value.toLowerCase(); buildResList(); });
document.getElementById("metricfilter").addEventListener("input", e => { S.mfilter = e.target.value.toLowerCase(); renderMain(); });

// ---------------- boot ----------------
async function refreshPods() {
  try {
    const pods = await fetch("/api/pods").then(r => r.ok ? r.json() : null);
    if (pods) {
      const had = S.pods.length;
      S.pods = pods;
      if (S.service === "EKS" && !S.rsearch) buildEKSNav();
      if (!had && pods.length && S.service === "EKS") renderMain();
      return pods.length;
    }
  } catch {}
  return S.pods.length;
}
async function boot() {
  // Paint immediately from the series list; pods fill in asynchronously.
  try {
    const series = await fetch("/api/series").then(r => r.json());
    for (const m of series) S.series.set(m.id, m);
  } catch (e) { console.error(e); }
  buildRail();
  connectStream();
  (async () => { // pods: quick retries while collectors warm up, then steady 30s
    for (let i = 0; i < 4; i++) {
      if (await refreshPods() > 0) break;
      await new Promise(r => setTimeout(r, 4000));
    }
    setInterval(refreshPods, 30000);
  })();
  fetch("/api/status").then(r => r.json()).then(st => {
    S.status = st;
    buildRail();
    const aws = st && st.aws;
    if (aws && aws.last_error) {
      document.getElementById("dot").title = "aws collector: " + aws.last_error;
      console.warn("aws collector:", aws.last_error);
    }
  }).catch(() => {});
}
boot();
</script>
