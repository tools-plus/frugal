<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>awsobs — live infrastructure</title>
<link rel="stylesheet" href="/vendor/uPlot.min.css">
<link rel="stylesheet" href="/styles.css">
<script src="/vendor/uPlot.iife.min.js"></script>
</head>
<body>
<header>
  <h1>awsobs <span>/ live infrastructure</span></h1>
  <div class="live"><div class="dot" id="dot"></div><span id="rate">connecting…</span></div>
</header>

<div class="layout">
  <nav id="rail"></nav>
  <div id="reslist">
    <div class="hd">
      <span class="svc" id="svcname">—</span><span class="cnt" id="svccnt"></span>
      <input id="ressearch" placeholder="search…">
    </div>
    <div id="resitems"></div>
  </div>
  <div id="main">
    <div id="mainbar">
      <span class="rname" id="rname">select a resource</span>
      <span class="phase" id="rphase"></span>
      <button id="logsbtn">logs</button>
      <input id="metricfilter" placeholder="filter metrics…">
      <div class="pills" id="pills"></div>
    </div>
    <div id="charts"><div class="empty">pick a service on the left rail</div></div>
  </div>
</div>

<div id="drawer">
  <div class="bar">
    <span class="name" id="logname"></span>
    <select id="logcontainer"></select>
    <label style="font-size:12px;color:var(--muted)"><input type="checkbox" id="follow" checked> follow</label>
    <button id="closelog">Close</button>
  </div>
  <pre id="loglines"></pre>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
