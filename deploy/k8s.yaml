# Deploy frugal inside the EKS cluster. This gives it:
#   - metrics.k8s.io + pod + log access via the ServiceAccount (RBAC below)
#   - CloudWatch read access via IRSA (annotate the ServiceAccount with an
#     IAM role that has cloudwatch:ListMetrics + cloudwatch:GetMetricData)
apiVersion: v1
kind: Namespace
metadata:
  name: frugal
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frugal
  namespace: frugal
  annotations:
    # Replace with your IRSA role. Minimal policy:
    #   cloudwatch:ListMetrics, cloudwatch:GetMetricData on *
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/frugal-cloudwatch-read
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: frugal-read
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: frugal-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: frugal-read
subjects:
  - kind: ServiceAccount
    name: frugal
    namespace: frugal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frugal
  namespace: frugal
spec:
  replicas: 1
  selector:
    matchLabels: { app: frugal }
  template:
    metadata:
      labels: { app: frugal }
    spec:
      serviceAccountName: frugal
      containers:
        - name: frugal
          image: ghcr.io/tools-plus/frugal:latest
          args: ["-config", "/etc/frugal/config.json"]
          env:
            - name: AWS_REGION
              value: ap-south-1
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 512Mi }
          volumeMounts:
            - name: config
              mountPath: /etc/frugal
      volumes:
        - name: config
          configMap:
            name: frugal-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frugal-config
  namespace: frugal
data:
  config.json: |
    {
      "listen": ":8080",
      "aws": { "enabled": true, "region": "ap-south-1" },
      "kubernetes": { "enabled": true, "poll_interval_seconds": 15 }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: frugal
  namespace: frugal
spec:
  selector: { app: frugal }
  ports:
    - port: 80
      targetPort: 8080
  # Access with: kubectl -n frugal port-forward svc/frugal 8080:80
  # (Put it behind your ingress + auth before exposing it wider.)
