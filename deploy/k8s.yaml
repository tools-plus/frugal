# Deploy awsobs inside the EKS cluster. This gives it:
#   - metrics.k8s.io + pod + log access via the ServiceAccount (RBAC below)
#   - CloudWatch read access via IRSA (annotate the ServiceAccount with an
#     IAM role that has cloudwatch:ListMetrics + cloudwatch:GetMetricData)
apiVersion: v1
kind: Namespace
metadata:
  name: awsobs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: awsobs
  namespace: awsobs
  annotations:
    # Replace with your IRSA role. Minimal policy:
    #   cloudwatch:ListMetrics, cloudwatch:GetMetricData on *
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/awsobs-cloudwatch-read
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: awsobs-read
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: awsobs-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: awsobs-read
subjects:
  - kind: ServiceAccount
    name: awsobs
    namespace: awsobs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: awsobs
  namespace: awsobs
spec:
  replicas: 1
  selector:
    matchLabels: { app: awsobs }
  template:
    metadata:
      labels: { app: awsobs }
    spec:
      serviceAccountName: awsobs
      containers:
        - name: awsobs
          image: YOUR_ECR_REPO/awsobs:latest
          args: ["-config", "/etc/awsobs/config.json"]
          env:
            - name: AWS_REGION
              value: ap-south-1
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 512Mi }
          volumeMounts:
            - name: config
              mountPath: /etc/awsobs
      volumes:
        - name: config
          configMap:
            name: awsobs-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: awsobs-config
  namespace: awsobs
data:
  config.json: |
    {
      "listen": ":8080",
      "aws": { "enabled": true, "region": "ap-south-1" },
      "kubernetes": { "enabled": true, "poll_interval_seconds": 15 }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: awsobs
  namespace: awsobs
spec:
  selector: { app: awsobs }
  ports:
    - port: 80
      targetPort: 8080
  # Access with: kubectl -n awsobs port-forward svc/awsobs 8080:80
  # (Put it behind your ingress + auth before exposing it wider.)
